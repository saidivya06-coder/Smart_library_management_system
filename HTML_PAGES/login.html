<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="navbar.css">
<style>

/* BACKGROUND */
body {
     padding-top: 90px;
    background: url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f") no-repeat center center/cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
}

/* 🔥 DARK OVERLAY (IMPORTANT FIX) */
body::before{
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5); /* controls transparency */
    z-index: 0;
      /* backdrop-filter: blur(2px); */
}

/* LOGIN CARD */
.login-card {
    position: relative;
    z-index: 1;
    background:antiquewhite;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 30px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color: #2C2C2C;
}

/* TITLE */
.login-title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
    color: #1e3a5f;
}

/* INPUTS */
.form-control, .form-select {
    background: #ffffff; /* 👈 solid white for clarity */
    border: 1px solid #ddd;
    color: #2C2C2C;
}

/* PLACEHOLDER */
.form-control::placeholder {
    color: #888;
}

/* FOCUS */
.form-control:focus {
    box-shadow: none;
    border: 1px solid #6C8EBF;
}

/* BUTTON */
.btn-custom {
    background: #6C8EBF;
    border: none;
    font-weight: bold;
    color: white;
    transition: 0.3s;
}
.btn-custom:hover {
    background: #5a7cad;
}

/* LABEL */
label {
    font-size: 14px;
    margin-top: 5px;
    color: #2C2C2C;
}

</style>

</head>

<body>



<div class="login-card">
    <h3 class="login-title">📚 Smart Library Login</h3>

    <form onsubmit="saveData(event)">
        
        <div class="mb-3">
            <label>Username</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
            <label>Email ID</label>
            <input type="email" id="email" class="form-control"
                placeholder="Enter your Email"
                pattern="^[A-Za-z]{1,20}\d{0,9}\@gmail.com$" required>
        </div>

        <div class="mb-3">
            <label>Mobile Number</label>
            <input type="text" id="mobile" class="form-control"
                placeholder="Enter 10 digit Mobile No"
                pattern="[6-9][0-9]{9}" required>
        </div>

        <div class="mb-3">
            <label>Year</label>
            <input type="text" id="year" class="form-control" placeholder="Enter your Year" required>
        </div>

        <div class="mb-3">
            <label>Branch</label>
            <select id="branch" class="form-select">
                <option>CSE</option>
                <option>CSM</option>
                <option>IT</option>
                <option>ECE</option>
                <option>Mech</option>
                <option>Chem</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Roll Number</label>
            <input type="number" id="rollno" class="form-control" placeholder="Enter your rollno" required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-custom">Login</button>
        </div>

    </form>
</div>

<script>
function saveData(event) {
    event.preventDefault(); 

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;
    let year = document.getElementById("year").value;
    let branch = document.getElementById("branch").value;
    let roll = document.getElementById("rollno").value;

    localStorage.setItem("username", name);
    localStorage.setItem("email", email);
    localStorage.setItem("mobileno", mobile);
    localStorage.setItem("year", year);
    localStorage.setItem("branch", branch);
    localStorage.setItem("rollno", roll);

    alert("Login Successful ✅");
    location.href='homepagef.html';
}
</script>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
