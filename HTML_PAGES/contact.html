<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="navbar.css">
<style>
/* Background */
.bg-section{
    background: url('../Images/Librarybg/contact/library1.jpg') center/cover no-repeat;
    min-height: 100vh;
    position: relative;
    color: #fff;
      
}
.bg-overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
     
}
.content{
    position:relative;
    z-index:2;
}

/* Center everything */
.center-box{
    max-width: 500px;
    margin: auto;
    text-align: center;
}

/* Improved typography */
h3{
    font-size: 2.5rem;
    font-weight: 600;
    margin-bottom: 20px;
}

.contact-box{
    font-size: 1.2rem;
    margin-bottom: 15px;
}

</style>
</head>

<body>
    <div id="navbar"></div>

<section class="bg-section d-flex align-items-center justify-content-center">
<div class="bg-overlay"></div>

<div class="container content">
<div class="center-box">

<p class="text-light fs-5">Support</p>
<h3>Get in touch</h3>

<div class="contact-box">📧 support@smartlibrary.com</div>
<div class="contact-box">📞 +91 1234567890</div>
<div class="contact-box">📍 Smart Library</div>



</div>
</div>

</section>
<script src="nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
